<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Nugortech IT Ltd</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #FF6B00; --b: #00A3FF; --s: #10b981; --bg: #f8fafc; --card: #ffffff; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); display: flex; color: #1e293b; }
        .sidebar { width: 280px; height: 100vh; background: var(--card); border-right: 1px solid #e2e8f0; padding: 40px; position: fixed; }
        .main { margin-left: 280px; width: 100%; padding: 50px; }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px; }
        .stat-card i { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; }
        .panel { background: white; padding: 30px; border-radius: 25px; border: 1px solid #e2e8f0; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .grid-2 { display: grid; grid-template-columns: 2.2fr 1fr; gap: 25px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 12px; font-size: 11px; color: #94a3b8; text-transform: uppercase; border-bottom: 1px solid #f1f5f9; }
        td { padding: 15px 12px; border-bottom: 1px solid #f8fafc; font-weight: 600; font-size: 13px; }
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; }
        .bin { background: #dcfce7; color: #15803d; } .bout { background: #fff7ed; color: #c2410c; }
        input { padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; outline: none; width: 100%; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color:var(--b); font-weight:800; margin:0;">Nugortech IT</h2>
        <p style="font-size:9px; color:var(--p); font-weight:800; letter-spacing:1px; margin-top:5px;">DIFFERENT CREATIVE THINK</p>
        <div style="margin-top:50px; font-weight:700; color:var(--b);"><i class="fas fa-chart-pie"></i> Analytics</div>
    </div>
    <div class="main">
        <h1 style="font-weight:800; margin-bottom:40px;">Enterprise Dashboard</h1>
        <div class="stat-grid">
            <div class="stat-card"><i class="fas fa-users" style="background:var(--b)"></i><div><div id="tS" style="font-size:24px; font-weight:800;">0</div><div>Total Staff</div></div></div>
            <div class="stat-card"><i class="fas fa-check" style="background:#10b981"></i><div><div id="tI" style="font-size:24px; font-weight:800;">0</div><div>Today In</div></div></div>
            <div class="stat-card"><i class="fas fa-database" style="background:#a855f7"></i><div><div id="tL" style="font-size:24px; font-weight:800;">0</div><div>Total Logs</div></div></div>
            <div class="stat-card"><i class="fas fa-xmark" style="background:#f43f5e"></i><div><div id="tA" style="font-size:24px; font-weight:800;">0</div><div>Absent</div></div></div>
        </div>
        <div class="grid-2">
            <div class="panel">
                <input type="text" id="src" placeholder="Search ID or Name..." onkeyup="filter()">
                <div style="max-height:450px; overflow-y:auto;">
                    <table id="tbl">
                        <thead><tr><th>Date</th><th>ID</th><th>Name</th><th>IN</th><th>OUT</th><th>Action</th></tr></thead>
                        <tbody id="tbody"></tbody>
                    </table>
                </div>
                <button onclick="exp()" style="margin-top:20px; background:var(--b); border:none; color:white; padding:10px 20px; border-radius:10px; cursor:pointer; font-weight:bold;">Export CSV</button>
                <button onclick="wipe()" style="margin-left:10px; background:#fee2e2; border:none; color:#f43f5e; padding:10px 20px; border-radius:10px; cursor:pointer; font-weight:bold;">Reset All</button>
            </div>
            <div class="panel" style="text-align:center;">
                <h3 style="font-size:14px; margin-bottom:30px;">Attendance Ratio</h3>
                <canvas id="chart"></canvas>
            </div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyB-AWYawVDTCAX0_ocZYQMqUI5ZteoDsIg", authDomain: "attendance-sheet-e3b6a.firebaseapp.com", databaseURL: "https://attendance-sheet-e3b6a-default-rtdb.firebaseio.com", projectId: "attendance-sheet-e3b6a", appId: "1:799184024638:web:82a23c732c074d98e80d6f" };
        firebase.initializeApp(firebaseConfig); const database = firebase.database();
        let myChart;
        database.ref('attendance').on('value', s => {
            const tbody = document.getElementById('tbody'); tbody.innerHTML = ""; const all = s.val();
            let logs = 0, todayP = 0, staff = new Set(); const tKey = new Date().toLocaleDateString('en-GB').replace(/\//g, "-");
            if (all) {
                Object.keys(all).reverse().forEach(date => {
                    Object.keys(all[date]).forEach(id => {
                        const d = all[date][id]; logs++; staff.add(id); if(date === tKey) todayP++;
                        tbody.innerHTML += `<tr><td>${date}</td><td style="color:var(--b);">#${id}</td><td>${d.name}</td><td><span class="badge bin">${d.inTime||'--'}</span></td><td><span class="badge bout">${d.outTime||'--'}</span></td><td><button onclick="del('${date}','${id}')" style="background:none; border:none; color:#f43f5e; cursor:pointer;"><i class="fas fa-trash"></i></button></td></tr>`;
                    });
                });
            }
            document.getElementById('tS').innerText = staff.size; document.getElementById('tI').innerText = todayP; document.getElementById('tL').innerText = logs;
            const ab = Math.max(0, staff.size - todayP); document.getElementById('tA').innerText = ab;
            updateChart(todayP, ab);
        });
        function updateChart(p, a) { const ctx = document.getElementById('chart').getContext('2d'); if (myChart) myChart.destroy(); myChart = new Chart(ctx, { type: 'doughnut', data: { labels: ['Present', 'Absent'], datasets: [{ data: [p, a], backgroundColor: ['#10b981', '#f1f5f9'], borderWidth: 0 }] }, options: { cutout: '80%', plugins: { legend: { position: 'bottom' } } } }); }
        function filter() { const s = document.getElementById('src').value.toUpperCase(); const rows = document.getElementById('tbody').getElementsByTagName('tr'); for (let r of rows) { r.style.display = r.innerText.toUpperCase().includes(s) ? "" : "none"; } }
        function exp() { let csv = "\uFEFFDate,ID,Name,In,Out\n"; document.querySelectorAll("#tbl tr").forEach((row, i) => { if(i === 0 || row.style.display === "none") return; csv += Array.from(row.querySelectorAll("td")).slice(0,5).map(c => c.innerText.replace("#","")).join(",") + "\n"; }); const b = new Blob([csv], { type: 'text/csv;charset=utf-8;' }); const l = document.createElement("a"); l.href = URL.createObjectURL(b); l.download = "Attendance.csv"; l.click(); }
        function del(d, i) { if(confirm("Delete?")) database.ref('attendance/'+d+'/'+i).remove(); }
        function wipe() { if(confirm("WIPE ALL?")) database.ref('attendance').remove(); }
    </script>
</body>
</html>

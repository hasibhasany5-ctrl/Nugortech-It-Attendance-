<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Dashboard | Nugortech IT Ltd</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --orange: #FF6B00; --blue: #00A3FF; --green: #00E676; --red: #FF1744; --bg: #0b0f19; }
        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { margin: 0; background: var(--bg); color: white; display: flex; min-height: 100vh; }

        .sidebar { width: 280px; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.1); padding: 50px 30px; position: fixed; height: 100vh; }
        .main { margin-left: 280px; width: calc(100% - 280px); padding: 50px; }

        /* Glowing Stat Cards */
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { padding: 30px 25px; border-radius: 30px; position: relative; overflow: hidden; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .c-1 { background: linear-gradient(135deg, #00A3FF 0%, #00D1FF 100%); }
        .c-2 { background: linear-gradient(135deg, #00E676 0%, #69F0AE 100%); color: #004d40; }
        .c-3 { background: linear-gradient(135deg, #FF6B00 0%, #FF9E5E 100%); }
        .c-4 { background: linear-gradient(135deg, #FF1744 0%, #FF5252 100%); }
        .stat-val { font-size: 32px; font-weight: 800; display: block; }
        .stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }

        /* Layout Grid */
        .panel-grid { display: grid; grid-template-columns: 2.2fr 1fr; gap: 30px; }
        .panel { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 35px; border-radius: 40px; backdrop-filter: blur(10px); }

        /* Colorful Controls */
        .controls { display: grid; grid-template-columns: 1fr 1.5fr auto auto; gap: 15px; margin-bottom: 30px; }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 14px 20px; border-radius: 15px; color: white; outline: none; }
        input:focus { border-color: var(--blue); }
        .btn { padding: 12px 25px; border-radius: 15px; border: none; cursor: pointer; font-weight: 800; color: white; }

        /* Table */
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 15px; font-size: 11px; color: #64748b; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; background: var(--bg); }
        td { padding: 20px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 600; font-size: 14px; }
        
        .badge { padding: 5px 12px; border-radius: 10px; font-size: 11px; font-weight: 800; }
        .b-in { background: rgba(0, 230, 118, 0.1); color: #00E676; }
        .b-late { background: #FF1744; color: white; box-shadow: 0 0 15px rgba(255, 23, 68, 0.4); }
        .b-time { background: var(--blue); color: white; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="margin:0; font-weight:800;">Nugortech IT</h2>
    <p style="color:var(--orange); font-size:9px; font-weight:800; letter-spacing:1px; margin-top:5px;">DIFFERENT CREATIVE THINK</p>
    <div style="margin-top: 60px; color: var(--blue); font-weight: 800; font-size: 18px;"><i class="fas fa-bolt"></i> DASHBOARD</div>
</div>

<div class="main">
    <h1 style="font-weight: 800; font-size: 32px; margin-bottom: 40px; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Analytics Console</h1>

    <div class="stat-grid">
        <div class="stat-card c-1"><span class="stat-val" id="s1">0</span><span class="stat-label">Total Staff</span></div>
        <div class="stat-card c-2"><span class="stat-val" id="s2">0</span><span class="stat-label">Present Today</span></div>
        <div class="stat-card c-3"><span class="stat-val" id="s3">0</span><span class="stat-label">Late Records</span></div>
        <div class="stat-card c-4"><span class="stat-val" id="s4">0</span><span class="stat-label">Absent Today</span></div>
    </div>

    <div class="panel-grid">
        <div class="panel">
            <div class="controls">
                <input type="text" id="idS" placeholder="Search ID..." onkeyup="filter()">
                <input type="text" id="dtS" placeholder="Date (28-02-2026)" onkeyup="filter()">
                <button class="btn" style="background:var(--blue)" onclick="exp()">CSV</button>
                <button class="btn" style="background:var(--red)" onclick="wipe()"><i class="fas fa-trash"></i></button>
            </div>
            <div style="max-height: 450px; overflow-y: auto;">
                <table id="tbl">
                    <thead><tr><th>Date</th><th>ID</th><th>Name</th><th>IN</th><th>OUT</th><th>Status</th></tr></thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
        <div class="panel" style="text-align: center;">
            <h3 style="font-size: 14px; margin-bottom: 40px; letter-spacing: 1px; color: #94a3b8;">DAILY RATIO</h3>
            <canvas id="chart"></canvas>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyB-AWYawVDTCAX0_ocZYQMqUI5ZteoDsIg", authDomain: "attendance-sheet-e3b6a.firebaseapp.com", databaseURL: "https://attendance-sheet-e3b6a-default-rtdb.firebaseio.com", projectId: "attendance-sheet-e3b6a", appId: "1:799184024638:web:82a23c732c074d98e80d6f" };
    firebase.initializeApp(firebaseConfig); const database = firebase.database();
    let dnt;

    database.ref('attendance').on('value', s => {
        const tbody = document.getElementById('tbody'); tbody.innerHTML = "";
        const all = s.val(); let present = 0, late = 0, logs = 0, staff = new Set();
        const tKey = new Date().toLocaleDateString('en-GB').replace(/\//g, "-");

        if (all) {
            Object.keys(all).reverse().forEach(date => {
                Object.keys(all[date]).forEach(id => {
                    const d = all[date][id]; logs++; staff.add(id);
                    let stBadge = `<span class="badge b-time">ON TIME</span>`;
                    if(d.attendanceStatus === "Late") { stBadge = `<span class="badge b-late">LATE</span>`; if(date === tKey) late++; }
                    if(date === tKey) present++;

                    tbody.innerHTML += `<tr><td>${date}</td><td style="color:var(--blue)">#${id}</td><td>${d.name}</td><td><span class="badge b-in">${d.inTime||'--'}</span></td><td><span class="badge b-in" style="color:var(--orange)">${d.outTime||'--'}</span></td><td>${stBadge}</td></tr>`;
                });
            });
        }
        document.getElementById('s1').innerText = staff.size; document.getElementById('s2').innerText = present;
        document.getElementById('s3').innerText = late;
        const ab = Math.max(0, staff.size - present); document.getElementById('s4').innerText = ab;
        updateChart(present - late, late, ab);
    });

    function updateChart(p, l, a) {
        const ctx = document.getElementById('chart').getContext('2d');
        if (dnt) dnt.destroy();
        dnt = new Chart(ctx, { type: 'doughnut', data: { labels: ['On Time', 'Late', 'Absent'], datasets: [{ data: [p, l, a], backgroundColor: ['#00E676', '#FF6B00', 'rgba(255,255,255,0.05)'], borderWidth: 0 }] }, options: { cutout: '85%', plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } } } });
    }
    function filter() { const s1 = document.getElementById('idS').value.toUpperCase(); const s2 = document.getElementById('dtS').value.toUpperCase(); const rows = document.getElementById('tbody').getElementsByTagName('tr'); for (let r of rows) { r.style.display = r.innerText.toUpperCase().includes(s1) && r.innerText.toUpperCase().includes(s2) ? "" : "none"; } }
    function exp() { let csv = "\uFEFFDate,ID,Name,In,Out,Status\n"; document.querySelectorAll("#tbl tr").forEach((row, i) => { if(i === 0) return; csv += Array.from(row.querySelectorAll("td")).slice(0, 6).map(c => c.innerText.replace("#","")).join(",") + "\n"; }); const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' }); const l = document.createElement("a"); l.href = URL.createObjectURL(blob); l.download = "Nugortech_Report.csv"; l.click(); }
    function wipe() { if(confirm("Wipe Database?")) database.ref('attendance').remove(); }
</script>
</body>
</html>

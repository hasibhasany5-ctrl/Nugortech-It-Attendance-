<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard | Nugortech IT Ltd</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #FF6B00; --b: #00A3FF; --s: #10b981; --d: #f43f5e; --bg: #0b0f19; --card: rgba(255,255,255,0.03); }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: white; display: flex; min-height: 100vh; }

        /* Colorful Sidebar */
        .sidebar { width: 280px; background: rgba(0,0,0,0.3); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.1); padding: 50px 30px; position: fixed; height: 100vh; }
        .nav-active { padding: 15px; border-radius: 15px; background: var(--card); border: 1px solid var(--b); color: var(--b); display: flex; align-items: center; gap: 12px; font-weight: 800; cursor: pointer; }

        /* Main Section */
        .main { margin-left: 280px; width: calc(100% - 280px); padding: 50px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }

        /* Vibrant Glowing Cards */
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .card { padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
        .c-1 { background: linear-gradient(135deg, #00A3FF 0%, #0066FF 100%); }
        .c-2 { background: linear-gradient(135deg, #00E676 0%, #00C853 100%); color: #003300; }
        .c-3 { background: linear-gradient(135deg, #FF6B00 0%, #E65100 100%); }
        .c-4 { background: linear-gradient(135deg, #FF1744 0%, #D50000 100%); }
        .v { font-size: 32px; font-weight: 800; display: block; }
        .l { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; }

        /* Content Panel */
        .grid-2 { display: grid; grid-template-columns: 2.2fr 1fr; gap: 25px; }
        .panel { background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 35px; border-radius: 35px; backdrop-filter: blur(10px); }

        .search { display: grid; grid-template-columns: 1fr 1.5fr auto auto; gap: 15px; margin-bottom: 25px; }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 14px 20px; border-radius: 15px; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--b); }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 15px; font-size: 10px; color: #64748b; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 18px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); font-weight: 600; font-size: 14px; }
        
        .badge { padding: 5px 12px; border-radius: 10px; font-size: 11px; font-weight: 800; }
        .b-in { background: rgba(0, 230, 118, 0.15); color: #00E676; }
        .b-late { background: #FF1744; color: white; box-shadow: 0 0 10px rgba(255, 23, 68, 0.5); }
        .b-time { background: var(--b); color: white; }

        .btn { padding: 12px 25px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; color: white; transition: 0.3s; }
        .btn-ex { background: var(--b); }
        .btn-cl { background: var(--d); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--b); border-radius: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="text-align:center; margin-bottom:50px;">
        <h2 style="margin:0; font-weight:800; color:white;">NUGORTECH IT</h2>
        <p style="color:var(--p); font-size:10px; font-weight:800; letter-spacing:1px; margin-top:5px; text-transform: uppercase;">Different Creative Think</p>
    </div>
    <div class="nav-active"><i class="fas fa-chart-line"></i> ANALYTICS HUB</div>
</div>

<div class="main">
    <div class="top-bar">
        <h1 style="font-weight: 800; margin:0; letter-spacing: -1px;">Enterprise Console</h1>
        <div id="tDay" style="font-weight: 700; color: #64748b;"></div>
    </div>

    <div class="stat-grid">
        <div class="card c-1"><span class="v" id="s1">0</span><span class="l">TOTAL STAFF</span></div>
        <div class="card c-2"><span class="v" id="s2">0</span><span class="l">PRESENT TODAY</span></div>
        <div class="card c-3"><span class="v" id="s3">0</span><span class="l">LATE TODAY</span></div>
        <div class="card c-4"><span class="v" id="s4">0</span><span class="l">ABSENT TODAY</span></div>
    </div>

    <div class="grid-2">
        <div class="panel">
            <div class="search">
                <input type="text" id="idF" placeholder="ID Search..." onkeyup="runFilter()">
                <input type="text" id="dtF" placeholder="Date (28-02-2026)" onkeyup="runFilter()">
                <button class="btn btn-ex" onclick="exp()">CSV</button>
                <button class="btn btn-cl" onclick="wipe()"><i class="fas fa-trash"></i></button>
            </div>
            <div style="max-height: 480px; overflow-y: auto;">
                <table id="myT">
                    <thead><tr><th>Date</th><th>ID</th><th>Name</th><th>IN</th><th>OUT</th><th>Status</th></tr></thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
        <div class="panel" style="text-align: center;">
            <h3 style="font-size: 14px; color: #94a3b8; margin-bottom: 40px;">ATTENDANCE RATIO</h3>
            <canvas id="chart"></canvas>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyB-AWYawVDTCAX0_ocZYQMqUI5ZteoDsIg", authDomain: "attendance-sheet-e3b6a.firebaseapp.com", databaseURL: "https://attendance-sheet-e3b6a-default-rtdb.firebaseio.com", projectId: "attendance-sheet-e3b6a", appId: "1:799184024638:web:82a23c732c074d98e80d6f" };
    firebase.initializeApp(firebaseConfig); const database = firebase.database();
    let donut;

    document.getElementById('tDay').innerText = new Date().toDateString();

    database.ref('attendance').on('value', snap => {
        const tbody = document.getElementById('tbody'); tbody.innerHTML = "";
        const all = snap.val(); let present = 0, late = 0, staff = new Set();
        const tKey = new Date().toLocaleDateString('en-GB').replace(/\//g, "-");

        if (all) {
            Object.keys(all).reverse().forEach(date => {
                Object.keys(all[date]).forEach(id => {
                    const d = all[date][id]; staff.add(id);
                    let stBadge = `<span class="badge b-time">ON TIME</span>`;
                    if(d.attendanceStatus === "Late") { 
                        stBadge = `<span class="badge b-late">LATE</span>`;
                        if(date === tKey) late++;
                    }
                    if(date === tKey) present++;

                    tbody.innerHTML += `<tr><td>${date}</td><td style="color:var(--b)">#${id}</td><td>${d.name}</td><td><span class="badge b-in">${d.inTime||'--'}</span></td><td><span class="badge b-in" style="color:var(--p)">${d.outTime||'--'}</span></td><td>${stBadge}</td></tr>`;
                });
            });
        }
        document.getElementById('s1').innerText = staff.size;
        document.getElementById('s2').innerText = present;
        document.getElementById('s3').innerText = late;
        const abs = Math.max(0, staff.size - present);
        document.getElementById('s4').innerText = abs;
        updateChart(present - late, late, abs);
    });

    function updateChart(p, l, a) {
        const ctx = document.getElementById('chart').getContext('2d'); if (donut) donut.destroy();
        donut = new Chart(ctx, { type: 'doughnut', data: { labels: ['On Time', 'Late', 'Absent'], datasets: [{ data: [p, l, a], backgroundColor: ['#00E676', '#FF1744', 'rgba(255,255,255,0.05)'], borderWidth: 0 }] }, options: { cutout: '85%', plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } } } });
    }
    function runFilter() { const val1 = document.getElementById('idF').value.toUpperCase(), val2 = document.getElementById('dtF').value.toUpperCase(), rows = document.getElementById('tbody').getElementsByTagName('tr'); for (let r of rows) { r.style.display = r.innerText.toUpperCase().includes(val1) && r.innerText.toUpperCase().includes(val2) ? "" : "none"; } }
    function exp() { let csv = "\uFEFFDate,ID,Name,In,Out,Status\n"; document.querySelectorAll("#myT tr").forEach((row, i) => { if(i === 0) return; csv += Array.from(row.querySelectorAll("td")).slice(0,6).map(c => c.innerText.replace("#","")).join(",") + "\n"; }); const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' }); const l = document.createElement("a"); l.href = URL.createObjectURL(blob); l.download = "Nugortech_Report.csv"; l.click(); }
    function wipe() { if(confirm("Wipe Database?")) database.ref('attendance').remove(); }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nugortech IT Ltd | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #FF6B00; --b: #00A3FF; --s: #10b981; --bg: #f8fafc; --card: #ffffff; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); display: flex; color: #1e293b; }
        .sidebar { width: 280px; height: 100vh; background: var(--card); border-right: 1px solid #e2e8f0; padding: 40px 25px; position: fixed; }
        .main { margin-left: 280px; width: 100%; padding: 50px; }
        .panel { background: white; padding: 30px; border-radius: 25px; border: 1px solid #e2e8f0; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px; }
        .stat-card i { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 12px; font-size: 11px; color: #94a3b8; text-transform: uppercase; border-bottom: 1px solid #f1f5f9; }
        td { padding: 15px 12px; border-bottom: 1px solid #f8fafc; font-weight: 600; font-size: 13px; }
        .btn { padding: 10px 20px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; color: white; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color: var(--b); font-weight: 800;">Nugortech IT</h2>
        <p style="font-size: 10px; color: var(--p); font-weight: bold;">DIFFERENT CREATIVE THINK</p>
        <div style="margin-top: 50px; font-weight: 600; color: #64748b;"><i class="fas fa-chart-line"></i> Dashboard</div>
    </div>
    <div class="main">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
            <h1 style="font-weight: 800; margin: 0; font-size: 28px;">Nugortech IT Ltd Dashboard</h1>
            <div id="today" style="font-weight: 600; color: #94a3b8;"></div>
        </div>
        <div class="stat-grid">
            <div class="stat-card"><i class="fas fa-user-group" style="background: var(--b);"></i><div><div id="tS" style="font-size: 24px; font-weight: 800;">0</div><div style="font-size: 11px; color: #94a3b8;">Total Staff</div></div></div>
            <div class="stat-card"><i class="fas fa-check-circle" style="background: var(--s);"></i><div><div id="tI" style="font-size: 24px; font-weight: 800;">0</div><div style="font-size: 11px; color: #94a3b8;">Today Present</div></div></div>
            <div class="stat-card"><i class="fas fa-database" style="background: #a855f7;"></i><div><div id="lif" style="font-size: 24px; font-weight: 800;">0</div><div style="font-size: 11px; color: #94a3b8;">Total Logs</div></div></div>
            <div class="stat-card"><i class="fas fa-times-circle" style="background: #f43f5e;"></i><div><div id="abs" style="font-size: 24px; font-weight: 800;">0</div><div style="font-size: 11px; color: #94a3b8;">Absent Today</div></div></div>
        </div>
        <div class="panel">
            <div style="display: flex; gap: 10px; margin-bottom: 25px;">
                <input type="text" id="idS" placeholder="Search ID..." onkeyup="filter()" style="padding: 12px; border-radius: 12px; border: 1px solid #ddd; flex: 1;">
                <button class="btn" style="background: var(--b);" onclick="exp()">Download CSV</button>
            </div>
            <table id="tbl">
                <thead><tr><th>Date</th><th>ID</th><th>Name</th><th>IN Time</th><th>OUT Time</th></tr></thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyB-AWYawVDTCAX0_ocZYQMqUI5ZteoDsIg", authDomain: "attendance-sheet-e3b6a.firebaseapp.com", databaseURL: "https://attendance-sheet-e3b6a-default-rtdb.firebaseio.com", projectId: "attendance-sheet-e3b6a", appId: "1:799184024638:web:82a23c732c074d98e80d6f" };
        firebase.initializeApp(firebaseConfig); const database = firebase.database();
        document.getElementById('today').innerText = new Date().toDateString();
        database.ref('attendance').on('value', (s) => {
            const tbody = document.getElementById('tbody'); tbody.innerHTML = ""; const all = s.val();
            let logs = 0, todayP = 0, staff = new Set(); const tKey = new Date().toLocaleDateString('en-GB').replace(/\//g, "-");
            if (all) {
                Object.keys(all).reverse().forEach(date => {
                    const day = all[date];
                    Object.keys(day).forEach(id => {
                        const data = day[id]; logs++; staff.add(id); if(date === tKey) todayP++;
                        tbody.innerHTML += `<tr><td>${date}</td><td style="color:var(--b);">#${id}</td><td>${data.name}</td><td>${data.inTime || '--'}</td><td>${data.outTime || '--'}</td></tr>`;
                    });
                });
            }
            document.getElementById('tS').innerText = staff.size; document.getElementById('tI').innerText = todayP; document.getElementById('lif').innerText = logs;
            document.getElementById('abs').innerText = (staff.size - todayP) < 0 ? 0 : (staff.size - todayP);
        });
        function filter() { const s = document.getElementById('idS').value.toUpperCase(); const rows = document.getElementById('tbody').getElementsByTagName('tr'); for (let r of rows) { r.style.display = r.innerText.toUpperCase().includes(s) ? "" : "none"; } }
        function exp() { let csv = "\uFEFFDate,ID,Name,In,Out\n"; document.querySelectorAll("#tbl tr").forEach((row, i) => { if(i === 0) return; csv += Array.from(row.querySelectorAll("td")).map(c => c.innerText).join(",") + "\n"; }); const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' }); const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "Nugortech_Attendance.csv"; link.click(); }
    </script>
</body>
</html>

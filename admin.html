<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Analytics | Nugortech IT Ltd</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --orange-glow: linear-gradient(135deg, #FF6B00 0%, #FF9E5E 100%);
            --blue-glow: linear-gradient(135deg, #00A3FF 0%, #00D1FF 100%);
            --green-glow: linear-gradient(135deg, #00E676 0%, #69F0AE 100%);
            --red-glow: linear-gradient(135deg, #FF1744 0%, #FF5252 100%);
            --bg-dark: #0b0f19;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { margin: 0; background: var(--bg-dark); color: white; display: flex; min-height: 100vh; overflow-x: hidden; }

        /* Sidebar UI */
        .sidebar { width: 280px; background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(20px); border-right: 1px solid var(--border); padding: 50px 25px; position: fixed; height: 100vh; z-index: 100; }
        .logo-box { text-align: center; margin-bottom: 50px; }
        .logo-text { font-size: 22px; font-weight: 800; margin: 0; }
        .logo-slogan { font-size: 9px; color: #FF6B00; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }

        .main { margin-left: 280px; width: 100%; padding: 40px; }

        /* Stats Colorful Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { padding: 25px; border-radius: 25px; border: 1px solid var(--border); transition: 0.3s; position: relative; overflow: hidden; }
        .card-1 { background: var(--blue-glow); }
        .card-2 { background: var(--green-glow); color: #003300; }
        .card-3 { background: var(--orange-glow); }
        .card-4 { background: var(--red-glow); }
        .stat-val { font-size: 32px; font-weight: 800; display: block; }
        .stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; opacity: 0.8; }

        /* Dashboard Body */
        .panel-grid { display: grid; grid-template-columns: 2.2fr 1fr; gap: 25px; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(15px); padding: 30px; border-radius: 35px; border: 1px solid var(--border); }

        .controls { display: grid; grid-template-columns: 1fr 1.5fr auto auto; gap: 12px; margin-bottom: 25px; }
        input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 12px 18px; border-radius: 12px; color: white; outline: none; transition: 0.3s; font-size: 13px; }
        input:focus { border-color: #00A3FF; }

        .btn { padding: 10px 20px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; color: white; display: flex; align-items: center; gap: 8px; transition: 0.3s; font-size: 12px; }
        .btn-csv { background: var(--blue-glow); }
        .btn-wipe { background: var(--red-glow); }

        /* Table */
        .table-wrap { max-height: 450px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 15px; font-size: 10px; color: #64748b; text-transform: uppercase; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-dark); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.03); font-weight: 600; font-size: 14px; }
        
        .badge { padding: 5px 12px; border-radius: 10px; font-size: 11px; font-weight: 800; }
        .b-in { background: rgba(0, 230, 118, 0.2); color: #00E676; }
        .b-late { background: #FF1744; color: white; box-shadow: 0 0 10px rgba(255, 23, 68, 0.4); }
        .b-time { background: #00A3FF; color: white; }

        .del-row { background: none; border: none; color: #f43f5e; cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .del-row:hover { opacity: 1; transform: scale(1.2); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-box">
        <h2 class="logo-text">NUGORTECH IT</h2>
        <p class="logo-slogan">Different Creative Think</p>
    </div>
    <div style="padding:15px; border-radius:15px; background:var(--glass); border:1px solid var(--b); color:#00A3FF; font-weight:800; text-align:center;">
        <i class="fas fa-chart-pie"></i> LIVE ANALYTICS
    </div>
</div>

<div class="main">
    <div class="stats-grid">
        <div class="stat-card card-1"><span class="stat-val" id="s1">0</span><span class="stat-label">Total Staff</span></div>
        <div class="stat-card card-2"><span class="stat-val" id="s2">0</span><span class="stat-label">Present Today</span></div>
        <div class="stat-card card-3"><span class="stat-val" id="s3">0</span><span class="stat-label">Late Today</span></div>
        <div class="stat-card card-4"><span class="stat-val" id="s4">0</span><span class="stat-label">Absent Today</span></div>
    </div>

    <div class="panel-grid">
        <div class="glass-panel">
            <div class="controls">
                <input type="text" id="idSearch" placeholder="Search ID/Name..." onkeyup="filter()">
                <input type="text" id="dateSearch" placeholder="Date (e.g. 28-02-2026)" onkeyup="filter()">
                <button class="btn btn-csv" onclick="exportCSV()"><i class="fas fa-file-excel"></i> Export</button>
                <button class="btn btn-wipe" onclick="wipeAll()"><i class="fas fa-trash-can"></i> Clear All</button>
            </div>
            <div class="table-wrap">
                <table id="myT">
                    <thead><tr><th>Date</th><th>ID</th><th>Name</th><th>IN</th><th>OUT</th><th>Status</th><th>Del</th></tr></thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
        <div class="glass-panel" style="text-align: center;">
            <h3 style="font-size: 14px; color: #94a3b8; margin-bottom: 40px;">ATTENDANCE RATIO</h3>
            <canvas id="chart"></canvas>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyB-AWYawVDTCAX0_ocZYQMqUI5ZteoDsIg", authDomain: "attendance-sheet-e3b6a.firebaseapp.com", databaseURL: "https://attendance-sheet-e3b6a-default-rtdb.firebaseio.com", projectId: "attendance-sheet-e3b6a", appId: "1:799184024638:web:82a23c732c074d98e80d6f" };
    firebase.initializeApp(firebaseConfig); const database = firebase.database();
    let donut;

    database.ref('attendance').on('value', snap => {
        const tbody = document.getElementById('tbody'); tbody.innerHTML = "";
        const all = snap.val(); let present = 0, late = 0, staff = new Set();
        const tKey = new Date().toLocaleDateString('en-GB').replace(/\//g, "-");

        if (all) {
            Object.keys(all).reverse().forEach(date => {
                Object.keys(all[date]).forEach(id => {
                    const d = all[date][id]; staff.add(id);
                    let stBadge = `<span class="badge b-time">ON TIME</span>`;
                    
                    // Logic check for Late
                    if (d.attendanceStatus === "Late") {
                        stBadge = `<span class="badge b-late">LATE</span>`;
                        if(date === tKey) late++;
                    }
                    if(date === tKey) present++;

                    tbody.innerHTML += `<tr><td>${date}</td><td style="color:#00A3FF">#${id}</td><td>${d.name}</td><td><span class="badge b-in">${d.inTime||'--'}</span></td><td><span class="badge b-in" style="color:#FF6B00; background:none;">${d.outTime||'--'}</span></td><td>${stBadge}</td><td><button onclick="delOne('${date}','${id}')" class="del-row"><i class="fas fa-trash-alt"></i></button></td></tr>`;
                });
            });
        }
        document.getElementById('s1').innerText = staff.size;
        document.getElementById('s2').innerText = present;
        document.getElementById('s3').innerText = late;
        const abs = Math.max(0, staff.size - present);
        document.getElementById('s4').innerText = abs;
        updateChart(present - late, late, abs);
    });

    function updateChart(p, l, a) { const ctx = document.getElementById('chart').getContext('2d'); if (donut) donut.destroy(); donut = new Chart(ctx, { type: 'doughnut', data: { labels: ['On Time', 'Late', 'Absent'], datasets: [{ data: [p, l, a], backgroundColor: ['#00E676', '#FF1744', 'rgba(255,255,255,0.05)'], borderWidth: 0 }] }, options: { cutout: '85%', plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } } } }); }
    function filter() { const v1 = document.getElementById('idSearch').value.toUpperCase(), v2 = document.getElementById('dateSearch').value.toUpperCase(), rows = document.getElementById('tbody').getElementsByTagName('tr'); for (let r of rows) { r.style.display = (r.innerText.toUpperCase().includes(v1) && r.innerText.toUpperCase().includes(v2)) ? "" : "none"; } }
    function exp() { let csv = "\uFEFFDate,ID,Name,In,Out,Status\n"; document.querySelectorAll("#myT tr").forEach((row, i) => { if(i === 0) return; csv += Array.from(row.querySelectorAll("td")).slice(0,6).map(c => c.innerText.replace("#","")).join(",") + "\n"; }); const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' }); const l = document.createElement("a"); l.href = URL.createObjectURL(blob); l.download = "Attendance_Report.csv"; l.click(); }
    
    // ডিলিট এবং ক্লিয়ার ফাংশন
    function delOne(d, i) { if(confirm("Delete this entry?")) database.ref('attendance/'+d+'/'+i).remove(); }
    function wipeAll() { 
        let p = prompt("Enter Master Password to Clear All Data:");
        if(p === "8087") { database.ref('attendance').remove(); alert("Database Cleared!"); } else { alert("Wrong Password!"); }
    }
</script>
</body>
</html>

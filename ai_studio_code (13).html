<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SaaS Dashboard | Nugortech IT Ltd</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #FF6B00; --b: #00A3FF; --s: #10b981; --bg: #f8fafc; --card: #ffffff; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); display: flex; color: #1e293b; }

        .sidebar { width: 280px; height: 100vh; background: var(--card); border-right: 1px solid #e2e8f0; padding: 40px 25px; position: fixed; box-shadow: 10px 0 30px rgba(0,0,0,0.02); }
        .nav-item { padding: 15px 25px; border-radius: 15px; margin-bottom: 8px; cursor: pointer; color: #64748b; display: flex; align-items: center; gap: 15px; font-weight: 600; transition: 0.3s; }
        .nav-item:hover, .active { background: #f1f5f9; color: var(--b); }

        .main { margin-left: 280px; width: 100%; padding: 50px; }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .stat-card i { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; }

        .panel-grid { display: grid; grid-template-columns: 2.2fr 1fr; gap: 25px; }
        .panel { background: white; padding: 30px; border-radius: 25px; border: 1px solid #e2e8f0; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 12px; margin-bottom: 25px; }
        input { padding: 12px 18px; border-radius: 12px; border: 1.5px solid #e2e8f0; outline: none; width: 100%; font-size: 13px; }
        input:focus { border-color: var(--b); }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 12px; font-size: 11px; color: #94a3b8; text-transform: uppercase; border-bottom: 1px solid #f1f5f9; }
        td { padding: 15px 12px; border-bottom: 1px solid #f8fafc; font-weight: 600; font-size: 13px; }
        
        .btn { padding: 10px 20px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; font-size: 12px; color: white; transition: 0.3s; }
        .btn-ex { background: var(--b); }
        .btn-cl { background: #fee2e2; color: #f43f5e; }

        .badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; }
        .bin { background: #dcfce7; color: #15803d; }
        .bout { background: #fff7ed; color: #c2410c; }
    </style>
</head>
<body>

<div class="sidebar">
    <img src="https://i.ibb.co/6RRL9HVM/Logo-Final.png" alt="Logo" style="height: 50px; margin-bottom: 40px;">
    <div class="nav-item active"><i class="fas fa-home"></i> Dashboard</div>
    <div class="nav-item"><i class="fas fa-users"></i> Employees</div>
    <div class="nav-item"><i class="fas fa-file-invoice"></i> Reports</div>
</div>

<div class="main">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
        <h1 style="font-weight: 800; margin: 0; font-size: 28px;">Enterprise Overview</h1>
        <div id="today" style="font-weight: 600; color: #94a3b8;"></div>
    </div>

    <div class="stat-grid">
        <div class="stat-card">
            <i class="fas fa-user-group" style="background: var(--b);"></i>
            <div><div id="tS" style="font-size: 24px; font-weight: 800;">0</div><div style="font-size: 11px; color: #94a3b8;">Total Staff</div></div>
        </div>
        <div class="stat-card">
            <i class="fas fa-check-circle" style="background: var(--s);"></i>
            <div><div id="tI" style="font-size: 24px; font-weight: 800;">0</div><div style="font-size: 11px; color: #94a3b8;">Present Today</div></div>
        </div>
        <div class="stat-card">
            <i class="fas fa-database" style="background: #a855f7;"></i>
            <div><div id="lif" style="font-size: 24px; font-weight: 800;">0</div><div style="font-size: 11px; color: #94a3b8;">Total Logs</div></div>
        </div>
        <div class="stat-card">
            <i class="fas fa-times-circle" style="background: #f43f5e;"></i>
            <div><div id="abs" style="font-size: 24px; font-weight: 800;">0</div><div style="font-size: 11px; color: #94a3b8;">Absent Today</div></div>
        </div>
    </div>

    <div class="panel-grid">
        <div class="panel">
            <div class="controls">
                <input type="text" id="idS" placeholder="Search ID or Name..." onkeyup="filter()">
                <input type="text" id="dtS" placeholder="Date (26-02-2026)..." onkeyup="filter()">
                <button class="btn btn-ex" onclick="exp()"><i class="fas fa-download"></i> CSV</button>
                <button class="btn btn-cl" onclick="wipe()"><i class="fas fa-trash"></i> Reset</button>
            </div>
            <div style="max-height: 480px; overflow-y: auto;">
                <table id="tbl">
                    <thead><tr><th>Date</th><th>ID</th><th>Name</th><th>IN Time</th><th>OUT Time</th><th>Action</th></tr></thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
        <div class="panel" style="text-align: center;">
            <h3 style="font-size: 15px; margin-bottom: 30px;">Daily Analytics</h3>
            <canvas id="chart"></canvas>
            <p style="margin-top: 25px; font-size: 12px; color: #94a3b8; font-weight: 600;">Attendance Ratio</p>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB-AWYawVDTCAX0_ocZYQMqUI5ZteoDsIg",
        authDomain: "attendance-sheet-e3b6a.firebaseapp.com",
        databaseURL: "https://attendance-sheet-e3b6a-default-rtdb.firebaseio.com",
        projectId: "attendance-sheet-e3b6a",
        appId: "1:799184024638:web:82a23c732c074d98e80d6f"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let dnt;

    document.getElementById('today').innerText = new Date().toDateString();

    database.ref('attendance').on('value', (s) => {
        const tbody = document.getElementById('tbody');
        tbody.innerHTML = "";
        const all = s.val();
        let logs = 0, todayP = 0, staff = new Set();
        const tKey = new Date().toLocaleDateString('en-GB').replace(/\//g, "-");

        if (all) {
            Object.keys(all).reverse().forEach(date => {
                const day = all[date];
                Object.keys(day).forEach(id => {
                    const data = day[id];
                    logs++; staff.add(id);
                    if(date === tKey) todayP++;
                    tbody.innerHTML += `<tr><td>${date}</td><td style="color:var(--b);">#${id}</td><td>${data.name}</td><td><span class="badge bin">${data.inTime || '--:--'}</span></td><td><span class="badge bout">${data.outTime || '--:--'}</span></td><td><button onclick="del('${date}','${id}')" style="border:none; background:none; color:#f43f5e; cursor:pointer;"><i class="fas fa-trash-alt"></i></button></td></tr>`;
                });
            });
        }
        document.getElementById('tS').innerText = staff.size;
        document.getElementById('tI').innerText = todayP;
        document.getElementById('lif').innerText = logs;
        const ab = (staff.size - todayP) < 0 ? 0 : (staff.size - todayP);
        document.getElementById('abs').innerText = ab;
        
        updChart(todayP, ab);
    });

    function updChart(p, a) {
        const ctx = document.getElementById('chart').getContext('2d');
        if (dnt) dnt.destroy();
        dnt = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['Present', 'Absent'], datasets: [{ data: [p, a], backgroundColor: ['#10b981', '#f1f5f9'], borderWidth: 0 }] },
            options: { cutout: '80%', plugins: { legend: { position: 'bottom' } } }
        });
    }

    function filter() {
        const s1 = document.getElementById('idS').value.toUpperCase();
        const s2 = document.getElementById('dtS').value.toUpperCase();
        const rows = document.getElementById('tbody').getElementsByTagName('tr');
        for (let r of rows) {
            const txt = r.innerText.toUpperCase();
            r.style.display = (txt.includes(s1) && txt.includes(s2)) ? "" : "none";
        }
    }

    function exp() {
        let csv = "\uFEFFDate,ID,Name,InTime,OutTime\n";
        document.querySelectorAll("#tbl tr").forEach((row, i) => {
            if(i === 0 || row.style.display === "none") return;
            csv += Array.from(row.querySelectorAll("td")).slice(0, 5).map(c => c.innerText.replace("#","")).join(",") + "\n";
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Nugortech_Report.csv";
        link.click();
    }

    function del(d, i) { if(confirm("Delete this?")) database.ref('attendance/'+d+'/'+i).remove(); }
    function wipe() { if(confirm("RESET ALL DATA?")) database.ref('attendance').remove(); }
</script>
</body>
</html>
